<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#E53935" />
  <title>{% block title %}{{ restaurant.name }}{% endblock %}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --red: #E53935;
      --red-dark: #B71C1C;
      --red-light: #FFEBEE;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --white: #FFFFFF;
      --shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.12);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }

    img {
      display: block;
      width: 100%;
      object-fit: cover;
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1rem;
      transition: all .2s;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--red);
      color: #fff;
      width: 100%;
      box-shadow: 0 8px 24px rgba(229, 57, 53, .3);
    }

    .btn-primary:hover {
      background: var(--red-dark);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-outline {
      background: transparent;
      color: var(--red);
      border: 2px solid var(--red);
      width: 100%;
    }

    /* Cards */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-body {
      padding: 16px;
    }

    /* Header */
    .page-header {
      background: #fff;
      padding: 48px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--gray-100);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--gray-900);
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--gray-900);
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: #fff;
      border-top: 1px solid var(--gray-100);
      display: flex;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 4px 14px;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--gray-400);
      border-top: 2px solid transparent;
      transition: all .2s;
    }

    .nav-item.active {
      color: var(--red);
      border-top-color: var(--red);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    /* Food Card */
    .food-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      display: flex;
      gap: 0;
      flex-direction: column;
    }

    .food-card-img {
      height: 160px;
      position: relative;
    }

    .food-card-img img {
      height: 100%;
      object-fit: cover;
    }

    .food-card-body {
      padding: 12px 14px 14px;
    }

    .food-card-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 4px;
    }

    .food-card-desc {
      font-size: 0.78rem;
      color: var(--gray-500);
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .food-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .food-card-price {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--gray-900);
    }

    .add-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      box-shadow: 0 4px 12px rgba(229, 57, 53, .4);
    }

    .add-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Tags */
    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 0.68rem;
      font-weight: 700;
    }

    .tag-veg {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .tag-nonveg {
      background: #FFEBEE;
      color: #C62828;
    }

    .tag-popular {
      background: #FFF8E1;
      color: #F57F17;
    }

    .spice {
      font-size: 0.72rem;
      color: var(--gray-500);
    }

    /* Badge */
    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--red);
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.65rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Qty control */
    .qty-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gray-100);
      border-radius: 12px;
      padding: 4px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    .qty-btn svg {
      width: 14px;
      height: 14px;
    }

    .qty-val {
      font-weight: 800;
      min-width: 20px;
      text-align: center;
      font-size: .9rem;
    }

    /* Status badge */
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 700;
    }

    .status-received {
      background: #E3F2FD;
      color: #1565C0;
    }

    .status-preparing {
      background: #FFF8E1;
      color: #E65100;
    }

    .status-ready {
      background: #F3E5F5;
      color: #6A1B9A;
    }

    .status-served {
      background: #E8F5E9;
      color: #1B5E20;
    }

    .status-completed {
      background: #E8F5E9;
      color: #1B5E20;
    }

    .status-cancelled {
      background: #FFEBEE;
      color: #B71C1C;
    }

    /* Section */
    .section {
      padding: 0 16px 24px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: 14px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .see-all {
      font-size: .82rem;
      font-weight: 700;
      color: var(--red);
    }

    /* Search bar */
    .search-bar {
      position: relative;
      margin: 0 0 12px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--gray-100);
      border: none;
      border-radius: 16px;
      font-size: .9rem;
      color: var(--gray-900);
      outline: none;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
    }

    .search-icon svg {
      width: 18px;
      height: 18px;
      color: var(--gray-400);
    }

    /* Floating cart bar */
    .cart-bar {
      position: fixed;
      bottom: 76px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 398px;
      background: var(--gray-900);
      border-radius: 18px;
      padding: 14px 18px;
      align-items: center;
      justify-content: space-between;
      z-index: 150;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .2);
      display: none;
    }

    .cart-bar.show {
      display: flex;
    }

    .cart-bar-info {
      color: #fff;
    }

    .cart-bar-count {
      font-size: .75rem;
      color: rgba(255, 255, 255, .7);
      font-weight: 600;
    }

    .cart-bar-total {
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
    }

    .cart-bar-btn {
      background: var(--red);
      color: #fff;
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: 700;
      font-size: .9rem;
    }

    /* Utility */
    .text-center {
      text-align: center;
    }

    .mt-4 {
      margin-top: 16px;
    }

    .mb-4 {
      margin-bottom: 16px;
    }

    .px-4 {
      padding-left: 16px;
      padding-right: 16px;
    }

    .pb-24 {
      padding-bottom: 96px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .divider {
      height: 1px;
      background: var(--gray-100);
      margin: 0 16px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      background: var(--gray-100);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .empty-icon svg {
      width: 40px;
      height: 40px;
      color: var(--gray-400);
    }

    .empty-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: .88rem;
      color: var(--gray-500);
      line-height: 1.5;
    }

    /* Horizontal scroll */
    .scroll-x {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding-bottom: 8px;
      scrollbar-width: none;
    }

    .scroll-x::-webkit-scrollbar {
      display: none;
    }

    .scroll-card {
      flex-shrink: 0;
      width: 230px;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .animate {
      animation: fadeIn .35s ease both;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>

<body>
  {% block content %}{% endblock %}

  <!-- Bottom Nav -->
  {% block bottom_nav %}
  <nav class="bottom-nav">
    <a href="/menu/{{ token }}/home/?table={{ table }}" class="nav-item {% block nav_home %}{% endblock %}">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
      </svg>
      Menu
    </a>
    <a href="/menu/{{ token }}/search/?table={{ table }}" class="nav-item {% block nav_search %}{% endblock %}">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
      </svg>
      Search
    </a>
    <a href="/menu/{{ token }}/cart/?table={{ table }}" class="nav-item {% block nav_cart %}{% endblock %}"
      id="nav-cart-link">
      <div style="position:relative;display:inline-block;">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.1 17 7 17h11v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 23.47 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z" />
        </svg>
        <span class="badge" id="cart-badge" style="display:none">0</span>
      </div>
      Cart
    </a>
    <a href="/menu/{{ token }}/orders/?table={{ table }}" class="nav-item {% block nav_orders %}{% endblock %}">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
      </svg>
      Orders
    </a>
  </nav>
  {% endblock %}

  <script>
    // Cart stored in sessionStorage
    const TOKEN = '{{ token }}';
    const TABLE = '{{ table }}';

    function getCart() {
      try { return JSON.parse(sessionStorage.getItem('cart_' + TOKEN) || '[]'); }
      catch (e) { return []; }
    }
    function saveCart(cart) {
      sessionStorage.setItem('cart_' + TOKEN, JSON.stringify(cart));
      updateCartBadge();
    }
    function updateCartBadge() {
      const cart = getCart();
      const count = cart.reduce((s, i) => s + i.quantity, 0);
      const badge = document.getElementById('cart-badge');
      if (badge) {
        badge.textContent = count;
        badge.style.display = count > 0 ? 'flex' : 'none';
      }
    }
    function addToCart(id, name, price, image) {
      const cart = getCart();
      const existing = cart.find(i => i.id === id);
      if (existing) { existing.quantity++; }
      else { cart.push({ id, name, price, image, quantity: 1 }); }
      saveCart(cart);
      showToast('Added to cart!');
      updateCartBar();
    }
    function showToast(msg) {
      let t = document.getElementById('toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'toast';
        t.style.cssText = 'position:fixed;bottom:160px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:12px;font-weight:700;z-index:999;font-size:.85rem;opacity:0;transition:opacity .3s;';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 2000);
    }
    function updateCartBar() {
      const cart = getCart();
      const bar = document.getElementById('floating-cart-bar');
      if (!bar) return;
      const count = cart.reduce((s, i) => s + i.quantity, 0);
      const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      if (count > 0) {
        bar.classList.add('show');
        const el = document.getElementById('cart-bar-info');
        if (el) el.innerHTML = `<div class="cart-bar-count">${count} item${count > 1 ? 's' : ''}</div><div class="cart-bar-total">₹${total.toFixed(0)}</div>`;
      } else {
        bar.classList.remove('show');
      }
    }
    document.addEventListener('DOMContentLoaded', function () {
      updateCartBadge();
      updateCartBar();
    });
  </script>
  {% block extra_scripts %}{% endblock %}
</body>

</html>
